<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoアプリ</title>

    <link rel="icon" href="image/favicon.ico" id="favicon">
    <link rel="apple-touch-icon" sizes="180x180" href="image/apple-touch-icon-180x180.png">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>📝 ToDoアプリ</h1>
            <p class="sub-title">毎日のタスクをすっきり整理</p>
            <p id="taskCount">タスク 0件 | 未完了 0件</p>

            <div class="stats-area">
                <div class="stat-card">
                    <p class="stat-label">総タスク</p>
                    <p id="totalStat" class="stat-value">0</p>
                </div>

                <div class="stat-card">
                    <p class="stat-label">完了</p>
                    <p id="completedStat" class="stat-value">0</p>
                </div>

                <div class="stat-card">
                    <p class="stat-label">完了率</p>
                    <p id="completionRateStat" class="stat-value">0%</p>
                </div>
            </div>
        </header>

        <div id="offlineBanner" class="offline-banner" style="display: none;">
            オフラインモードです
        </div>

        <div class="input-area">
            <input id="taskInput" type="text" placeholder="タスクを入力">
            <input type="datetime-local" id="dueDateInput">
            <select id="priorityInput">
                <option value="high">高</option>
                <option value="medium" selected>中</option>
                <option value="low">低</option>
            </select>
            <button id="addBtn" class="primary-btn">追加</button>
        </div>

        <div class="search-area">
            <input type="text" id="searchInput" placeholder="タスクを検索">
        </div>

        <div class="filter-area">
            <button id="filterAll" class="filter-btn active-filter">すべて</button>
            <button id="filterActiveBtn" class="filter-btn">未完了</button>
            <button id="filterCompletedBtn" class="filter-btn">完了</button>
        </div>

        <section class="task-section">
            <ul id="taskList"></ul>
            <p id="emptyMessage" class="empty-message">
                まだタスクがありません<br>
                最初のタスクを追加してみましょう！
            </p>

            <div id="completedSectionHeader" class="completed-header">
                完了タスク ▼
            </div>

            <ul id="completedTaskList"></ul>
        </section>

        <div class="bottom-actions">
            <button id="deleteCompletedBtn" class="success-btn">完了タスクを削除</button>
            <button id="deleteAllBtn" class="danger-btn">すべて削除</button>
            <button id="toggleThemeBtn" class="secondary-btn">ダークモード</button>
            <button id="installAppBtn" class="primary-btn" style="display: none;">アプリをインストール</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modalText"></p>
            <button id="editModalTask">編集</button>
            <button id="closeModal">閉じる</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content edit-modal-content">
            <h2 class="modal-title">タスク編集</h2>

            <input type="text" id="editTaskInput" placeholder="タスク名を入力">
            <input type="datetime-local" id="editDueDateInput">

            <select id="editPriorityInput">
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low">低</option>
            </select>

            <div class="modal-actions">
                <button id="saveEditBtn" class="primary-btn">保存</button>
                <button id="cancelEditBtn" class="secondary-btn">キャンセル</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
