<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoアプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ToDoアプリ</h1>
        <p id="taskCount">タスク 0件 | 未完了 0件</p>

        <div class="top-actions">
            <button id="deleteAllBtn">すべて削除</button>
            <button id="deleteCompletedBtn">完了タスクを削除</button>
            <button id="toggleThemeBtn">ダークモード</button>
        </div>

        <div class="input-area">
            <input id="taskInput" type="text" placeholder="タスクを入力">
            <button id="addBtn">追加</button>
        </div>

        <ul id="taskList"></ul>

        <div id="completedSectionHeader" class="completed-header">
            完了タスク ▼
        </div>

        <ul id="completedTaskList"></ul>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modalText"></p>
            <button id="editModalTask">編集</button>
            <button id="closeModal">閉じる</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
